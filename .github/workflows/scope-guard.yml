name: Scope Guard

# Runs on every PR regardless of which files changed.
# Fails if any file outside the allowed contributor paths is touched,
# protecting workflows, scripts, schemas, and the generated index from tampering.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-scope:
    name: Check PR Scope
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Allowed paths for contributors:
      #   registry/skills/<skillname>/skill.json  — new skill submission
      #   README.md                               — top-level readme only
      #
      # Blocked (reserved for maintainers):
      #   .github/              — workflow files
      #   scripts/              — publish & validate scripts
      #   schemas/              — JSON Schema definitions
      #   registry/index.json   — auto-generated by publish workflow
      #   registry/skills/_*/   — reserved directory names (templates, etc.)
      # -----------------------------------------------------------------------
      - name: Check for out-of-scope changes
        id: scope
        run: |
          ALL_FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Allow: registry/skills/<name>/skill.json
            # <name> must start with a lowercase letter or digit (blocks _TEMPLATE etc.)
            if echo "$file" | grep -qE '^registry/skills/[a-z0-9][a-z0-9-]*/skill\.json$'; then
              continue
            fi

            # Allow: README.md (top-level only)
            if [ "$file" = "README.md" ]; then
              continue
            fi

            # Everything else is a violation
            VIOLATIONS="${VIOLATIONS}${file}\n"
          done <<< "$ALL_FILES"

          if [ -n "$VIOLATIONS" ]; then
            echo "violations=true" >> "$GITHUB_OUTPUT"
            printf "%b" "$VIOLATIONS" > /tmp/violations.txt
            echo "Out-of-scope files detected:"
            cat /tmp/violations.txt
          else
            echo "violations=false" >> "$GITHUB_OUTPUT"
            echo "All changed files are within the allowed scope."
          fi

      - name: Comment violation details on PR
        if: steps.scope.outputs.violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = fs.readFileSync('/tmp/violations.txt', 'utf8')
              .trim().split('\n').filter(Boolean);

            const rows = files.map(f => `| \`${f}\` |`).join('\n');

            const body = [
              '## Scope Guard: Out-of-Scope Changes Detected',
              '',
              'This PR modifies files that contributors are not permitted to change.',
              '',
              '| File |',
              '|------|',
              rows,
              '',
              '**Allowed paths:**',
              '- `registry/skills/<skillname>/skill.json` — your skill submission',
              '- `README.md`',
              '',
              'Please remove all other changes and push again.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if violations found
        if: steps.scope.outputs.violations == 'true'
        run: |
          echo "PR contains changes outside the allowed paths. See PR comment for details."
          exit 1
